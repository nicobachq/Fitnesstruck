<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Fitness Truck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:Inter,sans-serif;background:#050505;color:#fff;display:grid;place-items:center;min-height:100vh;padding:24px}
    .card{max-width:560px;width:100%;background:#111;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:40px;text-align:center}
    h1{font-family:"Space Grotesk",sans-serif;margin:0 0 12px}
    p{color:#a0a0a0;margin:0 0 24px}
    a{display:inline-block;background:#ff1a1a;color:#fff;text-decoration:none;padding:14px 22px;border-radius:12px}
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Thank you</h1>
    <p id="message">Your submission has been received.</p>
    <a href="index.html">Back to Fitness Truck</a>
  </div>
  <script>
    const form = new URLSearchParams(location.search).get('form');
    const title = document.getElementById('title');
    const message = document.getElementById('message');
    if (form === 'newsletter') {
      title.textContent = 'You are on the list';
      message.textContent = 'Thanks for joining the Fitness Truck newsletter.';
    } else if (form === 'contact') {
      title.textContent = 'Message sent';
      message.textContent = 'Thanks for reaching out. We will get back to you soon.';
    }
  </script>
</body>
</html>
