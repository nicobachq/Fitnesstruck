<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you | Fitness Truck</title>
  <meta name="theme-color" content="#0b0b0b" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=65" />
</head>
<body class="thank-you-page">
  <div class="thank-you-card">
    <span class="section-eyebrow" id="eyebrow">Fitness Truck</span>
    <h1 class="section-title" id="title" style="margin-top:14px;">Thank you</h1>
    <p id="message">Your submission has been received.</p>
    <div class="thank-you-actions">
      <a href="index.html" class="btn btn-primary" id="homeLink">Back to home</a>
      <a href="account.html?view=signup" class="btn btn-secondary" id="accountLink">Create account</a>
    </div>
  </div>
  <script>
    (function () {
      const lang = (function () {
        try { return localStorage.getItem('ft_lang') === 'en' ? 'en' : 'it'; }
        catch (error) { return 'it'; }
      })();
      const form = new URLSearchParams(location.search).get('form');
      const copy = {
        it: {
          title: 'Grazie',
          message: 'La tua richiesta è stata ricevuta.',
          home: 'Torna alla home',
          account: 'Crea account',
          contactTitle: 'Messaggio inviato',
          contactMessage: 'Grazie per averci scritto. Ti risponderemo appena possibile.',
          newsletterTitle: 'Sei dentro',
          newsletterMessage: 'Grazie per esserti iscritto agli aggiornamenti Fitness Truck.'
        },
        en: {
          title: 'Thank you',
          message: 'Your submission has been received.',
          home: 'Back to home',
          account: 'Create account',
          contactTitle: 'Message sent',
          contactMessage: 'Thanks for reaching out. We will get back to you as soon as possible.',
          newsletterTitle: 'You are in',
          newsletterMessage: 'Thanks for joining Fitness Truck updates.'
        }
      };
      const active = copy[lang];
      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const homeLink = document.getElementById('homeLink');
      const accountLink = document.getElementById('accountLink');
      if (form === 'contact') {
        title.textContent = active.contactTitle;
        message.textContent = active.contactMessage;
      } else if (form === 'newsletter') {
        title.textContent = active.newsletterTitle;
        message.textContent = active.newsletterMessage;
      } else {
        title.textContent = active.title;
        message.textContent = active.message;
      }
      homeLink.textContent = active.home;
      accountLink.textContent = active.account;
      document.documentElement.lang = lang;
      document.title = title.textContent + ' | Fitness Truck';
    })();
  </script>
</body>
</html>
