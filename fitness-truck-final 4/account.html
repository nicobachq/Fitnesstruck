<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Truck | Account</title>
  <meta name="description" content="Accedi o crea il tuo account Fitness Truck." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

</head>
<body data-page="account">
  <div class="noise-overlay"></div>

      <div class="account-page-topbar">
        <a href="index.html" class="account-page-back">← Torna al sito</a>

      </div>

      <section class="account-page-surface">
        <div id="authPageContent"></div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
